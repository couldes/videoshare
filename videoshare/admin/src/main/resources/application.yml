server:
  port: 7070
  servlet:
    context-path: /
spring:
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    # ✅ 最终推荐版（已解决 utf8mb4 报错）
    url: jdbc:mysql://127.0.0.1:3306/recordvideo?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&allowMultiQueries=true&autoReconnect=true&nullCatalogMeansCurrent=true

    username: root
    password: 123456          # ← 改成你的真实密码

    hikari:
      pool-name: HikariCPDatasource
      minimum-idle: 5
      maximum-pool-size: 15
      idle-timeout: 180000
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1
  redis:
    database: 0
    host: 127.0.0.1
    port: 6379
    jedis:
      pool:
        max-active: 20
        max-wait: -1
        max-idle: 10
        min-idle: 0
    timeout: 2000
mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
  type-aliases-package: com.videoshare.common.entity

project:
  folder: d:/webser/videoshare/
log:
  root:
    level: debug
admin:
  account: admin
  password: admin123
  token-ttl: 1