server:
  port: 7075
  servlet:
    encoding:
      charset: UTF-8
      force: true

spring:
  application:
    name: videoshare-admin

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 50MB      # 考虑到视频分享，建议调大一点
      max-request-size: 50MB

  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/recordvideo?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowMultiQueries=true&allowPublicKeyRetrieval=true
    username: root
    password: "123456" # 建议加上引号，防止纯数字被识别为 long 类型

    # Hikari 连接池优化
    hikari:
      pool-name: VideoShareHikariCP
      minimum-idle: 5
      maximum-pool-size: 15
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1

  # Redis 配置
  redis:
    host: 127.0.0.1
    port: 6379
    password:
    database: 0
    timeout: 5000ms
    lettuce: # SpringBoot 2.x/3.x 默认使用 lettuce，建议用这个代替 jedis
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 2
        max-wait: -1ms

  # JSON 序列化优化（解决日期格式化问题）
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null # 字段为 null 时不返回，减少流量

# MyBatis 配置
mybatis:
  configuration:
    map-underscore-to-camel-case: true # 开启驼峰转换
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 开发环境下在控制台打印 SQL
  # 必须指定 Mapper.xml 的位置，否则会报之前日志里的 "No MyBatis mapper found"
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.videoshare.admin.entity # 实体类包路径

# 日志配置（注意：Spring 标准写法是 logging.level）
logging:
  level:
    root: info
    com.videoshare.admin: debug # 自己的业务代码开启 debug
    org.springframework: warn

# 自定义配置
project:
  folder: "d:/webser/videoshare/"